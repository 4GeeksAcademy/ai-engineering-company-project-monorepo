      function filterClaims(claims, filters) {
        return claims.filter(claim => {
          if (filters.locationId !== undefined && claim.locationId !== filters.locationId) return false;
          if (filters.status !== undefined && claim.status !== filters.status) return false;
          if (filters.payerName !== undefined && claim.payerName !== filters.payerName) return false;
          if (filters.serviceType !== undefined && claim.serviceType !== filters.serviceType) return false;
          return true;
        });
      }

      function filterAppointmentsByStatus(appointments, status) {
        return appointments.filter(appointment => status.includes(appointment.status));
      }

      function sortClaimsById(claims, direction) {
        return [...claims].sort((a, b) => {
          if (direction === "asc") return a.claimId.localeCompare(b.claimId);
          return b.claimId.localeCompare(a.claimId);
        });
      }

      function sortAppointmentsByDate(appointments, direction) {
        return [...appointments].sort((a, b) => {
          const dateA = new Date(a.scheduledDate).getTime();
          const dateB = new Date(b.scheduledDate).getTime();
          if (direction === "asc") return dateA - dateB;
          return dateB - dateA;
        });
      }

      function groupClaimsBy(claims, key) {
        return claims.reduce((groups, claim) => {
          const groupKey = claim[key];
          if (!groups[groupKey]) groups[groupKey] = [];
          groups[groupKey].push(claim);
          return groups;
        }, {});
      }

      function findClaimById(claims, claimId) {
        for (const claim of claims) {
          if (claim.claimId === claimId) return claim;
        }
        return null;
      }

      function findClinicianById(clinicians, clinicianId) {
        for (const clinician of clinicians) {
          if (clinician.clinicianId === clinicianId) return clinician;
        }
        return null;
      }

      function binarySearchClaimById(sortedClaims, targetId) {
        let left = 0;
        let right = sortedClaims.length - 1;

        while (left <= right) {
          const middle = Math.floor((left + right) / 2);
          const comparison = sortedClaims[middle].claimId.localeCompare(targetId);

          if (comparison === 0) return middle;
          if (comparison < 0) left = middle + 1;
          else right = middle - 1;
        }
        return -1;
      }

      function roundToTwoDecimals(value) {
        return Math.round(value * 100) / 100;
      }

      function roundToOneDecimal(value) {
        return Math.round(value * 10) / 10;
      }

      function daysBetween(startDate, endDate) {
        const start = new Date(startDate).getTime();
        const end = new Date(endDate).getTime();
        const msPerDay = 1000 * 60 * 60 * 24;
        return Math.round((end - start) / msPerDay);
      }

      function calculateDenialRate(claims) {
        if (claims.length === 0) {
          throw new Error("Cannot calculate denial rate on an empty claims array");
        }
        const deniedCount = claims.filter(claim => claim.status === "denied").length;
        return roundToTwoDecimals((deniedCount / claims.length) * 100);
      }

      function denialRateByPayer(claims) {
        const groups = {};
        for (const claim of claims) {
          if (!groups[claim.payerName]) groups[claim.payerName] = [];
          groups[claim.payerName].push(claim);
        }

        const rates = {};
        for (const payer in groups) {
          rates[payer] = calculateDenialRate(groups[payer]);
        }
        return rates;
      }

      function denialRateByLocation(claims) {
        const groups = {};
        for (const claim of claims) {
          if (!groups[claim.locationId]) groups[claim.locationId] = [];
          groups[claim.locationId].push(claim);
        }

        const rates = {};
        for (const location in groups) {
          rates[location] = calculateDenialRate(groups[location]);
        }
        return rates;
      }

      function flagHighDenialPayers(claims, threshold = 8) {
        const rates = denialRateByPayer(claims);
        return Object.keys(rates).filter(payer => rates[payer] > threshold);
      }

      function calculateNoShowCost(appointments, location, weekEndingDate) {
        const endDate = new Date(weekEndingDate);
        const startDate = new Date(endDate);
        startDate.setDate(startDate.getDate() - 6);

        const noShowsInWindow = appointments.filter(appointment => {
          if (appointment.locationId !== location.locationId) return false;
          if (appointment.status !== "no_show") return false;
          const scheduled = new Date(appointment.scheduledDate);
          return scheduled >= startDate && scheduled <= endDate;
        });

        if (noShowsInWindow.length === 0) return 0;

        const total = noShowsInWindow.reduce((sum, appointment) => {
          return sum + location.averageConsultationFee[appointment.serviceType];
        }, 0);

        return roundToTwoDecimals(total);
      }

      function noShowRateByLocation(appointments) {
        const groups = {};
        for (const appointment of appointments) {
          if (!groups[appointment.locationId]) groups[appointment.locationId] = [];
          groups[appointment.locationId].push(appointment);
        }

        const rates = {};
        for (const locationId in groups) {
          const locationAppointments = groups[locationId];
          const noShows = locationAppointments.filter(a => a.status === "no_show").length;
          rates[locationId] = roundToTwoDecimals((noShows / locationAppointments.length) * 100);
        }
        return rates;
      }

      function flagHighNoShowLocations(appointments, threshold = 20) {
        const rates = noShowRateByLocation(appointments);
        return Object.keys(rates).filter(locationId => rates[locationId] > threshold);
      }

      function determineCMEStatus(clinician, asOfDate) {
        const cycleStart = new Date(clinician.cmeYearStartDate);
        const cycleEnd = new Date(cycleStart);
        cycleEnd.setFullYear(cycleEnd.getFullYear() + 1);
        const asOf = new Date(asOfDate);

        const daysRemainingInCycle = daysBetween(asOfDate, cycleEnd.toISOString().split("T")[0]);

        if (clinician.cmeHoursLogged >= clinician.cmeHoursRequired) {
          return { status: "complete", daysRemainingInCycle };
        }

        if (asOf >= cycleEnd) {
          return { status: "overdue", daysRemainingInCycle };
        }

        const totalCycleDays = daysBetween(
          clinician.cmeYearStartDate,
          cycleEnd.toISOString().split("T")[0]
        );
        const daysElapsed = daysBetween(clinician.cmeYearStartDate, asOfDate);
        const expectedPercentComplete = (daysElapsed / totalCycleDays) * 100;
        const actualPercentComplete =
          clinician.cmeHoursRequired === 0
            ? 100
            : (clinician.cmeHoursLogged / clinician.cmeHoursRequired) * 100;

        if (expectedPercentComplete - actualPercentComplete > 15) {
          return { status: "at_risk", daysRemainingInCycle };
        }

        return { status: "on_track", daysRemainingInCycle };
      }

      function generateCMEReport(clinicians, asOfDate) {
        return clinicians.map(clinician => {
          const { status, daysRemainingInCycle } = determineCMEStatus(clinician, asOfDate);
          const hoursRemaining = Math.max(0, clinician.cmeHoursRequired - clinician.cmeHoursLogged);
          const percentComplete =
            clinician.cmeHoursRequired === 0
              ? 100
              : roundToOneDecimal((clinician.cmeHoursLogged / clinician.cmeHoursRequired) * 100);
          const licenceDaysRemaining = daysBetween(asOfDate, clinician.licenceExpiryDate);

          return {
            clinicianId: clinician.clinicianId,
            fullName: `${clinician.firstName} ${clinician.lastName}`,
            role: clinician.role,
            locationId: clinician.locationId,
            hoursRequired: clinician.cmeHoursRequired,
            hoursLogged: clinician.cmeHoursLogged,
            hoursRemaining,
            percentComplete,
            daysRemainingInCycle,
            complianceStatus: status,
            licenceExpiryDate: clinician.licenceExpiryDate,
            licenceDaysRemaining,
          };
        });
      }

      function getCliniciansAtRisk(clinicians, asOfDate) {
        const reports = generateCMEReport(clinicians, asOfDate);
        const atRiskIds = new Set(
          reports
            .filter(r => r.complianceStatus === "at_risk" || r.complianceStatus === "overdue")
            .map(r => r.clinicianId)
        );
        return clinicians.filter(c => atRiskIds.has(c.clinicianId));
      }

      function getCliniciansWithExpiringLicences(clinicians, asOfDate, daysThreshold) {
        return clinicians.filter(clinician => {
          const daysUntilExpiry = daysBetween(asOfDate, clinician.licenceExpiryDate);
          return daysUntilExpiry <= daysThreshold;
        });
      }

      const PATIENT_ID_REGEX = /^HC-[A-Z0-9]{6}$/;

      function validateClaim(claim, knownLocationIds) {
        const errors = [];

        if (claim.claimAmount <= 0) {
          errors.push("claimAmount must be greater than 0");
        }

        const submissionDate = new Date(claim.submissionDate);
        const today = new Date();
        if (submissionDate > today) {
          errors.push("submissionDate must not be a future date");
        }

        if (!knownLocationIds.includes(claim.locationId)) {
          errors.push(`locationId '${claim.locationId}' is not a known clinic ID`);
        }

        if (claim.status === "denied" && !claim.denialReason) {
          errors.push("denialReason must be present when status is 'denied'");
        }

        if (!PATIENT_ID_REGEX.test(claim.patientId)) {
          errors.push("patientId must match format HC-XXXXXX (6 alphanumeric characters)");
        }

        return { valid: errors.length === 0, errors };
      }

      function validateClinician(clinician) {
        const errors = [];
        const validRoles = ["physician", "nurse_practitioner", "nurse", "medical_assistant"];

        if (clinician.cmeHoursRequired < 0) {
          errors.push("cmeHoursRequired must be >= 0");
        }

        if (clinician.cmeHoursLogged < 0) {
          errors.push("cmeHoursLogged must be >= 0");
        }

        const expiryDate = new Date(clinician.licenceExpiryDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        if (expiryDate < today) {
          errors.push("licenceExpiryDate is in the past — licence expired");
        }

        if (!validRoles.includes(clinician.role)) {
          errors.push(`role must be one of: ${validRoles.join(", ")}`);
        }

        return { valid: errors.length === 0, errors };
      }

      function isDenialRateAboveThreshold(rate, threshold = 8) {
        return rate > threshold;
      }

      function isNoShowRateAboveThreshold(rate, threshold = 20) {
        return rate > threshold;
      }

      const invalidClaim = {
        claimId: "CLM-999999",
        patientId: "INVALID",
        locationId: "us-xx-999",
        serviceType: "primary_care",
        payerName: "BlueCross",
        payerId: "BC001",
        submissionDate: "2030-01-01",
        claimAmount: -50,
        status: "denied",
        resubmitted: false,
      };

      const invalidClinician = {
        clinicianId: "CLN-999999",
        firstName: "Test",
        lastName: "User",
        role: "surgeon",
        locationId: "us-tx-001",
        licenceState: "TX",
        licenceExpiryDate: "2020-01-01",
        cmeHoursRequired: -5,
        cmeHoursLogged: -1,
        cmeYearStartDate: "2025-01-01",
      };

      const actions = {
        calculateDenialRate: {
          label: "calculateDenialRate(sampleClaims)",
          run: () => calculateDenialRate(sampleClaims),
        },
        denialRateByPayer: {
          label: "denialRateByPayer(sampleClaims)",
          run: () => denialRateByPayer(sampleClaims),
        },
        denialRateByLocation: {
          label: "denialRateByLocation(sampleClaims)",
          run: () => denialRateByLocation(sampleClaims),
        },
        flagHighDenialPayers: {
          label: "flagHighDenialPayers(sampleClaims)",
          run: () => flagHighDenialPayers(sampleClaims),
        },
        calculateNoShowCost: {
          label: "calculateNoShowCost(sampleAppointments, Austin, 2025-03-14)",
          run: () => {
            if (!austinLocation) throw new Error("Austin location not found in sampleLocations");
            return calculateNoShowCost(sampleAppointments, austinLocation, weekEndingDate);
          },
        },
        noShowRateByLocation: {
          label: "noShowRateByLocation(sampleAppointments)",
          run: () => noShowRateByLocation(sampleAppointments),
        },
        flagHighNoShowLocations: {
          label: "flagHighNoShowLocations(sampleAppointments)",
          run: () => flagHighNoShowLocations(sampleAppointments),
        },
        generateCMEReport: {
          label: "generateCMEReport(sampleClinicians, 2025-07-01)",
          run: () => generateCMEReport(sampleClinicians, asOfDate),
        },
        getCliniciansAtRisk: {
          label: "getCliniciansAtRisk(sampleClinicians, 2025-07-01)",
          run: () => getCliniciansAtRisk(sampleClinicians, asOfDate),
        },
        getCliniciansWithExpiringLicences: {
          label: "getCliniciansWithExpiringLicences(sampleClinicians, 2025-07-01, 90)",
          run: () => getCliniciansWithExpiringLicences(sampleClinicians, asOfDate, 90),
        },
        filterClaimsDenied: {
          label: "filterClaims(sampleClaims, { status: 'denied' })",
          run: () => filterClaims(sampleClaims, { status: "denied" }),
        },
        filterClaimsBlueCross: {
          label: "filterClaims(sampleClaims, { payerName: 'BlueCross' })",
          run: () => filterClaims(sampleClaims, { payerName: "BlueCross" }),
        },
        sortClaimsById: {
          label: "sortClaimsById(sampleClaims, 'asc')",
          run: () => sortClaimsById(sampleClaims, "asc"),
        },
        sortAppointmentsByDate: {
          label: "sortAppointmentsByDate(sampleAppointments, 'desc')",
          run: () => sortAppointmentsByDate(sampleAppointments, "desc"),
        },
        groupClaimsBy: {
          label: "groupClaimsBy(sampleClaims, 'payerName')",
          run: () => groupClaimsBy(sampleClaims, "payerName"),
        },
        findClaimById: {
          label: "findClaimById(sampleClaims, 'CLM-000003')",
          run: () => findClaimById(sampleClaims, "CLM-000003"),
        },
        binarySearchClaimById: {
          label: "binarySearchClaimById(sortClaimsById(sampleClaims, 'asc'), 'CLM-000004')",
          run: () => {
            const sortedClaims = sortClaimsById(sampleClaims, "asc");
            return binarySearchClaimById(sortedClaims, "CLM-000004");
          },
        },
        findClinicianById: {
          label: "findClinicianById(sampleClinicians, 'CLN-000002')",
          run: () => findClinicianById(sampleClinicians, "CLN-000002"),
        },
        validateClaimValid: {
          label: "validateClaim(validSampleClaim, knownLocationIds)",
          run: () => validateClaim(sampleClaims[0], knownLocationIds),
        },
        validateClaimInvalid: {
          label: "validateClaim(invalidClaim, knownLocationIds)",
          run: () => validateClaim(invalidClaim, knownLocationIds),
        },
        validateClinicianValid: {
          label: "validateClinician(validSampleClinician)",
          run: () => validateClinician(sampleClinicians[0]),
        },
        validateClinicianInvalid: {
          label: "validateClinician(invalidClinician)",
          run: () => validateClinician(invalidClinician),
        },
      };

      function toPrettyJson(value) {
        if (value === undefined) return "undefined";
        if (typeof value === "string") return JSON.stringify(value, null, 2);
        return JSON.stringify(value, null, 2);
      }

      function showOutput(title, value, isError = false) {
        outputTitle.textContent = title;
        outputTitle.className = `truncate rounded-md border px-2 py-1 text-xs ${
          isError
            ? "border-rose-500 bg-rose-950 text-rose-200"
            : "border-slate-600 bg-slate-800 text-cyan-200"
        }`;
        outputPanel.textContent = toPrettyJson(value);
      }

      document.querySelectorAll("button[data-action]").forEach(button => {
        button.addEventListener("click", () => {
          const actionName = button.getAttribute("data-action");
          const action = actionName ? actions[actionName] : null;
          if (!action) return;

          try {
            const result = action.run();
            showOutput(action.label, result);
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            showOutput(action.label, { error: message }, true);
          }
        });
      });

      document.getElementById("clear-output").addEventListener("click", () => {
        outputTitle.textContent = "Ready";
        outputTitle.className = "truncate rounded-md border border-slate-600 bg-slate-800 px-2 py-1 text-xs text-cyan-200";
        outputPanel.textContent = JSON.stringify(
          { message: "Output cleared. Select another function to run." },
          null,
          2
        );
      });

      window.HealthCoreTestFunctions = {
        filterClaims,
        filterAppointmentsByStatus,
        sortClaimsById,
        sortAppointmentsByDate,
        groupClaimsBy,
        findClaimById,
        findClinicianById,
        binarySearchClaimById,
        calculateDenialRate,
        denialRateByPayer,
        denialRateByLocation,
        flagHighDenialPayers,
        calculateNoShowCost,
        noShowRateByLocation,
        flagHighNoShowLocations,
        generateCMEReport,
        getCliniciansAtRisk,
        getCliniciansWithExpiringLicences,
        validateClaim,
        validateClinician,
        isDenialRateAboveThreshold,
        isNoShowRateAboveThreshold,
      };
    </script>
  </body>
</html>
